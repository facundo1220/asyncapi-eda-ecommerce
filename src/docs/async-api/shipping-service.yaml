asyncapi: 3.1.0

info:
  title: Shipping Service API
  version: 1.0.0
  description: Servicio encargado de gestionar envíos
  tags:
    - name: shipping

servers:
  rabbitmq:
    host: "{host}:{port}"
    protocol: amqp
    security:
      - $ref: "#/components/securitySchemes/user-password"
    variables:
      host:
        description: Host del servidor RabbitMQ
        default: localhost
      port:
        description: Puerto de conexión
        default: "5672"

channels:
  pago_procesado:
    address: pago_procesado
    messages:
      PagoProcesado:
        $ref: "#/components/messages/PagoProcesado"
  pago_rechazado:
    address: pago_rechazado
    messages:
      PagoRechazado:
        $ref: "#/components/messages/PagoRechazado"

  envio.creado:
    address: envio.{envioId}.creado
    parameters:
      envioId:
        $ref: "#/components/parameters/envioId"
    messages:
      EnvioCreado:
        $ref: "#/components/messages/EnvioCreado"

operations:
  onPagoProcesado:
    action: receive
    summary: Recibe evento de pago procesado para iniciar envío
    channel:
      $ref: "#/channels/pago.procesado"
    messages:
      - $ref: "#/channels/pago.procesado/messages/PagoProcesado"
    tags:
      - name: payments

  sendEnvioCreado:
    action: send
    summary: Publica envío creado
    channel:
      $ref: "#/channels/envio.creado"
    messages:
      - $ref: "#/channels/envio.creado/messages/EnvioCreado"
    tags:
      - name: shipping

components:
  securitySchemes:
    user-password:
      type: userPassword

  parameters:
    envioId:
      description: El identificador del envío.
    orderId:
      description: El identificador del pedido.

  messages:
    EnvioCreado:
      name: EnvioCreado
      payload:
        $ref: "#/components/schemas/EnvioCreadoPayload"
    PagoProcesado:
      name: PagoProcesado
      payload:
        $ref: "#/components/schemas/PagoProcesadoPayload"

  schemas:
    EnvioCreadoPayload:
      type: object
      properties:
        envioId:
          type: string
        orderId:
          type: string
        address:
          type: string
      required: [envioId, orderId, address]
    PagoProcesadoPayload:
      type: object
      properties:
        orderId:
          type: string
        status:
          type: string
      required: [orderId, status]
