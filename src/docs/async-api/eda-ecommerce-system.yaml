asyncapi: 3.1.0
info:
  title: EDA Ecommerce System
  version: 1.0.0
  description: |
    Documentación unificada de los microservicios de ecommerce basados en eventos usando RabbitMQ y AsyncAPI.
    Incluye: Order, Payment, Inventory, Shipping y Notification Service.
  tags:
    - name: ecommerce

servers:
  rabbitmq:
    host: "{host}:{port}"
    protocol: amqp
    security:
      - $ref: "#/components/securitySchemes/user-password"
    variables:
      host:
        description: Host del servidor RabbitMQ
        default: localhost
      port:
        description: Puerto de conexión
        default: "5672"

channels:
  order_created:
    address: order_created
    messages:
      PedidoCreado:
        $ref: "#/components/messages/PedidoCreado"
  pago_procesado:
    address: pago_procesado
    messages:
      PagoProcesado:
        $ref: "#/components/messages/PagoProcesado"
  pago_rechazado:
    address: pago_rechazado
    messages:
      PagoRechazado:
        $ref: "#/components/messages/PagoRechazado"
  inventario_descontado:
    address: inventario_descontado
    messages:
      InventarioDescontado:
        $ref: "#/components/messages/InventarioDescontado"
  envio_creado:
    address: envio_creado
    messages:
      EnvioCreado:
        $ref: "#/components/messages/EnvioCreado"
  notificacion_enviada:
    address: notificacion_enviada
    messages:
      NotificacionEnviada:
        $ref: "#/components/messages/NotificacionEnviada"

operations:
  sendPedidoCreado:
    action: send
    summary: Publica un pedido creado
    channel:
      $ref: "#/channels/order_created"
    messages:
      - $ref: "#/channels/order_created/messages/PedidoCreado"
    tags:
      - name: orders
  onPedidoCreado:
    action: receive
    summary: Recibe evento de pedido creado para procesar pago
    channel:
      $ref: "#/channels/order_created"
    messages:
      - $ref: "#/channels/order_created/messages/PedidoCreado"
    tags:
      - name: payments
  sendPagoProcesado:
    action: send
    summary: Publica pago procesado
    channel:
      $ref: "#/channels/pago_procesado"
    messages:
      - $ref: "#/channels/pago_procesado/messages/PagoProcesado"
    tags:
      - name: payments
  sendPagoRechazado:
    action: send
    summary: Publica pago rechazado
    channel:
      $ref: "#/channels/pago_rechazado"
    messages:
      - $ref: "#/channels/pago_rechazado/messages/PagoRechazado"
    tags:
      - name: payments
  onPagoProcesado:
    action: receive
    summary: Recibe evento de pago procesado para descontar inventario y gestionar envío
    channel:
      $ref: "#/channels/pago_procesado"
    messages:
      - $ref: "#/channels/pago_procesado/messages/PagoProcesado"
    tags:
      - name: inventory
      - name: shipping
  sendInventarioDescontado:
    action: send
    summary: Publica inventario descontado
    channel:
      $ref: "#/channels/inventario_descontado"
    messages:
      - $ref: "#/channels/inventario_descontado/messages/InventarioDescontado"
    tags:
      - name: inventory
  sendEnvioCreado:
    action: send
    summary: Publica envío creado
    channel:
      $ref: "#/channels/envio_creado"
    messages:
      - $ref: "#/channels/envio_creado/messages/EnvioCreado"
    tags:
      - name: shipping
  onPagoRechazado:
    action: receive
    summary: Recibe evento de pago rechazado para notificar
    channel:
      $ref: "#/channels/pago_rechazado"
    messages:
      - $ref: "#/channels/pago_rechazado/messages/PagoRechazado"
    tags:
      - name: notifications
  sendNotificacionEnviada:
    action: send
    summary: Publica notificación enviada
    channel:
      $ref: "#/channels/notificacion_enviada"
    messages:
      - $ref: "#/channels/notificacion_enviada/messages/NotificacionEnviada"
    tags:
      - name: notifications

components:
  securitySchemes:
    user-password:
      type: userPassword
  messages:
    PedidoCreado:
      name: PedidoCreado
      payload:
        $ref: "#/components/schemas/PedidoCreadoPayload"
    PagoProcesado:
      name: PagoProcesado
      payload:
        $ref: "#/components/schemas/PagoProcesadoPayload"
    PagoRechazado:
      name: PagoRechazado
      payload:
        $ref: "#/components/schemas/PagoRechazadoPayload"
    InventarioDescontado:
      name: InventarioDescontado
      payload:
        $ref: "#/components/schemas/InventarioDescontadoPayload"
    EnvioCreado:
      name: EnvioCreado
      payload:
        $ref: "#/components/schemas/EnvioCreadoPayload"
    NotificacionEnviada:
      name: NotificacionEnviada
      payload:
        $ref: "#/components/schemas/NotificacionEnviadaPayload"
  schemas:
    PedidoCreadoPayload:
      type: object
      properties:
        orderId:
          type: string
        userId:
          type: string
        total:
          type: number
      required: [orderId, userId, total]
    PagoProcesadoPayload:
      type: object
      properties:
        orderId:
          type: string
        status:
          type: string
      required: [orderId, status]
    PagoRechazadoPayload:
      type: object
      properties:
        orderId:
          type: string
        reason:
          type: string
      required: [orderId, reason]
    InventarioDescontadoPayload:
      type: object
      properties:
        orderId:
          type: string
        productId:
          type: string
        quantity:
          type: number
      required: [orderId, productId, quantity]
    EnvioCreadoPayload:
      type: object
      properties:
        envioId:
          type: string
        orderId:
          type: string
        address:
          type: string
      required: [envioId, orderId, address]
    NotificacionEnviadaPayload:
      type: object
      properties:
        notificationId:
          type: string
        userId:
          type: string
        message:
          type: string
      required: [notificationId, userId, message]
