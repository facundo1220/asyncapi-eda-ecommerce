asyncapi: 3.1.0

info:
  title: Payment Service API
  version: 1.0.0
  tags:
    - name: payments

servers:
  rabbitmq:
    host: "{host}:{port}"
    protocol: amqp
    security:
      - $ref: "#/components/securitySchemes/user-password"
    variables:
      host:
        description: Host del servidor RabbitMQ
        default: localhost
      port:
        description: Puerto de conexión
        default: "5672"

channels:
  pedido.creado:
    address: pedido.{orderId}.creado
    messages:
      PedidoCreado:
        $ref: "#/components/messages/PedidoCreado"
    parameters:
      orderId:
        $ref: "#/components/parameters/orderId"
    order_created:
      address: order_created
      messages:
        PedidoCreado:
          $ref: "#/components/messages/PedidoCreado"
        $ref: "#/components/parameters/orderId"
    messages:
      PagoProcesado:
        $ref: "#/components/messages/PagoProcesado"

  pago.rechazado:
    address: pago.{orderId}.rechazado
    parameters:
      orderId:
        $ref: "#/components/parameters/orderId"
    messages:
      PagoRechazado:
        $ref: "#/components/messages/PagoRechazado"

operations:
  onPedidoCreado:
    action: receive
    channel:
      $ref: "#/channels/pedido.creado"
    messages:
      - $ref: "#/channels/pedido.creado/messages/PedidoCreado"
  pago_procesado:
    address: pago_procesado
    messages:
      PagoProcesado:
        $ref: "#/components/messages/PagoProcesado"
  sendPagoRechazado:
    action: send
    channel:
      $ref: "#/channels/pago.rechazado"
    messages:
      - $ref: "#/channels/pago.rechazado/messages/PagoRechazado"

components:
  securitySchemes:
  pago_rechazado:
    address: pago_rechazado
    messages:
      PagoRechazado:
        $ref: "#/components/messages/PagoRechazado"
      payload:
        $ref: "#/components/schemas/PedidoCreadoPayload"

    PagoProcesado:
      payload:
        $ref: "#/components/schemas/PagoProcesadoPayload"

    PagoRechazado:
      payload:
        $ref: "#/components/schemas/PagoRechazadoPayload"

  schemas:
    PedidoCreadoPayload:
      type: object
      properties:
        orderId:
          type: string

    PagoProcesadoPayload:
      type: object
      properties:
        orderId:
          type: string
        status:
          type: string

    PagoRechazadoPayload:
      type: object
      properties:
        orderId:
          type: string
        reason:
          type: string
