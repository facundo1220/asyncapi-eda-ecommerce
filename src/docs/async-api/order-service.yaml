asyncapi: 3.1.0
info:
  title: Order Service API
  version: 1.0.0
  description: Servicio encargado de crear pedidos
  tags:
    - name: orders

servers:
  rabbitmq:
    host: "{host}:{port}"
    protocol: amqp
    security:
      - $ref: "#/components/securitySchemes/user-password"
    variables:
      host:
        description: Host del servidor RabbitMQ
        default: localhost
      port:
        description: Puerto de conexión
        default: "5672"

channels:
  order_created:
    address: order_created
    messages:
      PedidoCreado:
        $ref: "#/components/messages/PedidoCreado"

operations:
  sendPedidoCreado:
    action: send
    summary: Publica un pedido creado
    channel:
      $ref: "#/channels/order_created"
    messages:
      - $ref: "#/channels/order_created/messages/PedidoCreado"
    tags:
      - name: orders

components:
  securitySchemes:
    user-password:
      type: userPassword

  messages:
    PedidoCreado:
      name: PedidoCreado
      payload:
        $ref: "#/components/schemas/PedidoCreadoPayload"

  schemas:
    PedidoCreadoPayload:
      type: object
      properties:
        orderId:
          type: string
        userId:
          type: string
        total:
          type: number
      required: [orderId, userId, total]

