asyncapi: 3.1.0

info:
  title: Notification Service API
  version: 1.0.0
  description: Servicio encargado de notificar eventos
  tags:
    - name: notifications

servers:
  rabbitmq:
    host: "{host}:{port}"
    protocol: amqp
    security:
      - $ref: "#/components/securitySchemes/user-password"
    variables:
      host:
        description: Host del servidor RabbitMQ
        default: localhost
      port:
        description: Puerto de conexión
        default: "5672"

channels:
  pago.rechazado:
    address: pago.{orderId}.rechazado
    parameters:
      orderId:
        $ref: "#/components/parameters/orderId"
    messages:
      PagoRechazado:
        $ref: "#/components/messages/PagoRechazado"

  notificacion.enviada:
    address: notificacion.{notificationId}.enviada
    parameters:
      notificationId:
        $ref: "#/components/parameters/notificationId"
    messages:
      NotificacionEnviada:
        $ref: "#/components/messages/NotificacionEnviada"

operations:
  onPagoRechazado:
    action: receive
    summary: Recibe evento de pago rechazado para notificar
    channel:
      $ref: "#/channels/pago.rechazado"
    messages:
      - $ref: "#/channels/pago.rechazado/messages/PagoRechazado"
    tags:
      - name: payments

  sendNotificacionEnviada:
    action: send
    summary: Publica notificación enviada
    channel:
      $ref: "#/channels/notificacion.enviada"
    messages:
      - $ref: "#/channels/notificacion.enviada/messages/NotificacionEnviada"
    tags:
      - name: notifications

components:
  securitySchemes:
    user-password:
      type: userPassword

  parameters:
    notificationId:
      description: El identificador de la notificación.
    orderId:
      description: El identificador del pedido.

  messages:
    NotificacionEnviada:
      name: NotificacionEnviada
      payload:
        $ref: "#/components/schemas/NotificacionEnviadaPayload"
    PagoRechazado:
      name: PagoRechazado
      payload:
        $ref: "#/components/schemas/PagoRechazadoPayload"

  schemas:
    NotificacionEnviadaPayload:
      type: object
      properties:
        notificationId:
          type: string
        userId:
          type: string
        message:
          type: string
      required: [notificationId, userId, message]
    PagoRechazadoPayload:
      type: object
      properties:
        orderId:
          type: string
        reason:
          type: string
      required: [orderId, reason]
