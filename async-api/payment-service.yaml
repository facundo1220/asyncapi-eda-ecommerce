asyncapi: 3.0.1

info:
  title: Payment Service API
  version: 1.0.0

tags:
  - name: payments

servers:
  rabbitmq:
    host: "{host}:{port}"
    protocol: amqp
    security:
      - user-password: []
    variables:
      host:
        description: Host del servidor RabbitMQ
        default: localhost
      port:
        description: Puerto de conexión
        default: 5672

channels:
  pedido.creado:
    address: pedido.{orderId}.creado
    parameters:
      orderId:
        $ref: "#/components/parameters/orderId"
    bindings:
      amqp:
        exchange:
          name: pedidoExchange
          type: topic
        routingKey: pedido.{orderId}.creado
  pago.procesado:
    address: pago.procesado
    bindings:
      amqp:
        exchange:
          name: pagoExchange
          type: topic
        routingKey: pago.procesado
  pago.rechazado:
    address: pago.rechazado
    bindings:
      amqp:
        exchange:
          name: pagoExchange
          type: topic
        routingKey: pago.rechazado

operations:
  onPedidoCreado:
    action: receive
    channel:
      $ref: "#/channels/pedido.creado"
    messages:
      - $ref: "#/components/messages/PedidoCreado"

  sendPagoProcesado:
    action: send
    channel:
      $ref: "#/channels/pago.procesado"
    messages:
      - $ref: "#/components/messages/PagoProcesado"

  sendPagoRechazado:
    action: send
    channel:
      $ref: "#/channels/pago.rechazado"
    messages:
      - $ref: "#/components/messages/PagoRechazado"

components:
  securitySchemes:
    user-password:
      type: userPassword
  parameters:
    orderId:
      description: El identificador del pedido.
      schema:
        type: string

  messages:
    PedidoCreado:
      payload:
        $ref: "#/components/schemas/PedidoCreadoPayload"

    PagoProcesado:
      payload:
        $ref: "#/components/schemas/PagoProcesadoPayload"

    PagoRechazado:
      payload:
        $ref: "#/components/schemas/PagoRechazadoPayload"

  schemas:
    PedidoCreadoPayload:
      type: object
      properties:
        orderId:
          type: string

    PagoProcesadoPayload:
      type: object
      properties:
        orderId:
          type: string
        status:
          type: string

    PagoRechazadoPayload:
      type: object
      properties:
        orderId:
          type: string
        reason:
          type: string
