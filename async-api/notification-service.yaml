asyncapi: 3.1.0

info:
  title: Notification Service API
  version: 1.0.0
  description: Servicio encargado de notificar eventos
  tags:
    - name: notifications

servers:
  rabbitmq:
    host: "{host}:{port}"
    protocol: amqp
    security:
      - $ref: "#/components/securitySchemes/user-password"
    variables:
      host:
        description: Host del servidor RabbitMQ
        default: localhost
      port:
        description: Puerto de conexión
        default: "5672"

channels:
  notificacion.enviada:
    address: notificacion.{notificationId}.enviada
    parameters:
      notificationId:
        $ref: "#/components/parameters/notificationId"
    messages:
      NotificacionEnviada:
        $ref: "#/components/messages/NotificacionEnviada"

operations:
  sendNotificacionEnviada:
    action: send
    summary: Publica notificación enviada
    channel:
      $ref: "#/channels/notificacion.enviada"
    messages:
      - $ref: "#/channels/notificacion.enviada/messages/NotificacionEnviada"
    tags:
      - name: notifications

components:
  securitySchemes:
    user-password:
      type: userPassword

  parameters:
    notificationId:
      description: El identificador de la notificación.

  messages:
    NotificacionEnviada:
      name: NotificacionEnviada
      payload:
        $ref: "#/components/schemas/NotificacionEnviadaPayload"

  schemas:
    NotificacionEnviadaPayload:
      type: object
      properties:
        notificationId:
          type: string
        userId:
          type: string
        message:
          type: string
      required: [notificationId, userId, message]
