asyncapi: 3.0.0

info:
  title: Payment Service API
  version: 1.0.0

tags:
  - name: payments

servers:
  rabbitmq:
    host: localhost:5672
    protocol: amqp
    security:
      - user-password: []

channels:
  pedido.creado:
    address: pedido.creado
  pago.procesado:
    address: pago.procesado
  pago.rechazado:
    address: pago.rechazado

operations:
  onPedidoCreado:
    action: receive
    channel:
      $ref: "#/channels/pedido.creado"
    messages:
      - $ref: "#/components/messages/PedidoCreado"

  sendPagoProcesado:
    action: send
    channel:
      $ref: "#/channels/pago.procesado"
    messages:
      - $ref: "#/components/messages/PagoProcesado"

  sendPagoRechazado:
    action: send
    channel:
      $ref: "#/channels/pago.rechazado"
    messages:
      - $ref: "#/components/messages/PagoRechazado"

components:
  securitySchemes:
    user-password:
      type: userPassword

  messages:
    PedidoCreado:
      payload:
        $ref: "#/components/schemas/PedidoCreadoPayload"

    PagoProcesado:
      payload:
        $ref: "#/components/schemas/PagoProcesadoPayload"

    PagoRechazado:
      payload:
        $ref: "#/components/schemas/PagoRechazadoPayload"

  schemas:
    PedidoCreadoPayload:
      type: object
      properties:
        orderId:
          type: string

    PagoProcesadoPayload:
      type: object
      properties:
        orderId:
          type: string
        status:
          type: string

    PagoRechazadoPayload:
      type: object
      properties:
        orderId:
          type: string
        reason:
          type: string
