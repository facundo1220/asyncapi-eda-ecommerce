asyncapi: 3.0.1

info:
  title: Inventory Service API
  version: 1.0.0

tags:
  - name: inventory

servers:
  rabbitmq:
    host: "{host}:{port}"
    protocol: amqp
    variables:
      host:
        description: Host del servidor RabbitMQ
        default: localhost
      port:
        description: Puerto de conexión
        default: 5672

channels:
  pago.procesado:
    address: pago.procesado
    bindings:
      amqp:
        exchange:
          name: pagoExchange
          type: topic
        routingKey: pago.procesado
  inventario.descontado:
    address: inventario.{orderId}.descontado
    parameters:
      orderId:
        $ref: "#/components/parameters/orderId"
    bindings:
      amqp:
        exchange:
          name: inventarioExchange
          type: topic
        routingKey: inventario.{orderId}.descontado

operations:
  onPagoProcesado:
    action: receive
    channel:
      $ref: "#/channels/pago.procesado"

  sendInventarioDescontado:
    action: send
    channel:
      $ref: "#/channels/inventario.descontado"

components:
  messages:
    InventarioDescontado:
      payload:
        $ref: "#/components/schemas/InventarioDescontadoPayload"

  schemas:
    InventarioDescontadoPayload:
      type: object
      properties:
        orderId:
          type: string
  parameters:
    orderId:
      description: El identificador del pedido.
      schema:
        type: string
